<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prueba fundacional 1 - Ciencias</title>
  <style>
    :root {
      --rosa: #ff8fc7;
      --rosa-claro: #ffd6ec;
      --lila: #b88cff;
      --lila-suave: #eadcff;
      --morado: #5f2c82;
      --blanco: #fffaff;
      --verde: #57c785;
      --amarillo: #ffe066;
      --azul: #7bdff2;
      --sombra: rgba(95, 44, 130, 0.22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      color: var(--morado);
      background:
        radial-gradient(circle at 12% 16%, rgba(255,255,255,.8) 0 2px, transparent 3px),
        radial-gradient(circle at 80% 18%, rgba(255,255,255,.7) 0 3px, transparent 4px),
        radial-gradient(circle at 22% 80%, rgba(255,255,255,.55) 0 2px, transparent 3px),
        linear-gradient(135deg, #ffb3d9 0%, #f8c7ff 42%, #c9b6ff 100%);
      overflow-x: hidden;
    }

    .decoracion {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .flotante {
      position: absolute;
      font-size: clamp(1.8rem, 4vw, 3.4rem);
      filter: drop-shadow(0 8px 12px rgba(119, 65, 150, .16));
      animation: flotar var(--duracion, 8s) ease-in-out infinite;
      opacity: .78;
    }

    .f1 { top: 6%; left: 6%; --duracion: 7s; }
    .f2 { top: 10%; right: 7%; --duracion: 9s; animation-delay: -2s; }
    .f3 { top: 47%; left: 3%; --duracion: 8s; animation-delay: -4s; }
    .f4 { bottom: 8%; right: 9%; --duracion: 10s; animation-delay: -3s; }
    .f5 { bottom: 14%; left: 10%; --duracion: 11s; animation-delay: -5s; }
    .f6 { top: 32%; right: 3%; --duracion: 7.5s; animation-delay: -1s; }

    @keyframes flotar {
      0%, 100% { transform: translateY(0) rotate(-4deg) scale(1); }
      50% { transform: translateY(-22px) rotate(5deg) scale(1.08); }
    }

    .estrella-fondo {
      position: absolute;
      color: rgba(255, 255, 255, .82);
      animation: brillar 1.8s ease-in-out infinite alternate;
    }

    @keyframes brillar {
      from { transform: scale(.75); opacity: .35; }
      to { transform: scale(1.15); opacity: 1; }
    }

    .contenedor {
      position: relative;
      z-index: 1;
      width: min(980px, 94vw);
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    header {
      text-align: center;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 4.4rem);
      line-height: 1.02;
      color: #fff;
      text-shadow: 0 5px 0 rgba(142, 68, 173, .28), 0 12px 26px rgba(95, 44, 130, .22);
    }

    .subtitulo {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255, 250, 255, .72);
      border: 3px solid rgba(255,255,255,.85);
      font-size: clamp(1rem, 3.8vw, 1.45rem);
      font-weight: 900;
      box-shadow: 0 12px 22px var(--sombra);
    }

    .tarjeta {
      background: rgba(255, 250, 255, .87);
      border: 5px solid rgba(255, 255, 255, .9);
      border-radius: 34px;
      box-shadow: 0 24px 50px var(--sombra);
      padding: clamp(18px, 4vw, 34px);
      position: relative;
      overflow: hidden;
    }

    .tarjeta::before {
      content: "🌈";
      position: absolute;
      right: -6px;
      top: -18px;
      font-size: clamp(4rem, 12vw, 8rem);
      opacity: .35;
      transform: rotate(12deg);
    }

    .barra-superior {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      position: relative;
    }

    .puntaje, .progreso {
      background: linear-gradient(135deg, var(--rosa-claro), var(--lila-suave));
      border: 3px solid #fff;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: clamp(1rem, 3.5vw, 1.35rem);
      font-weight: 900;
      box-shadow: 0 8px 16px rgba(95,44,130,.14);
    }

    .pregunta {
      min-height: 118px;
      display: grid;
      place-items: center;
      text-align: center;
      font-size: clamp(1.65rem, 5.8vw, 3rem);
      font-weight: 900;
      line-height: 1.15;
      margin: 8px 0 22px;
      padding: 18px;
      background: linear-gradient(135deg, rgba(255,255,255,.74), rgba(255,240,250,.82));
      border-radius: 28px;
      border: 3px dashed rgba(184, 140, 255, .55);
    }

    .opciones {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    button {
      font: inherit;
    }

    .opcion {
      min-height: 116px;
      border: 0;
      border-radius: 28px;
      padding: 16px 12px;
      color: var(--morado);
      background: linear-gradient(180deg, #fff, #ffe8f5);
      box-shadow: 0 9px 0 #df8fc1, 0 18px 20px rgba(95,44,130,.15);
      font-size: clamp(1.15rem, 4vw, 1.75rem);
      font-weight: 900;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, filter .16s ease;
    }

    .opcion:hover, .opcion:focus-visible {
      transform: translateY(-5px) scale(1.02);
      filter: brightness(1.03);
      outline: 4px solid rgba(123, 223, 242, .75);
    }

    .opcion:active {
      transform: translateY(4px);
      box-shadow: 0 5px 0 #df8fc1, 0 10px 16px rgba(95,44,130,.12);
    }

    .opcion.correcta {
      background: linear-gradient(180deg, #f3ffe8, #b7f7c9);
      box-shadow: 0 9px 0 #57c785, 0 18px 20px rgba(95,44,130,.15);
    }

    .opcion.incorrecta {
      background: linear-gradient(180deg, #fff6fb, #ffd4e9);
      box-shadow: 0 9px 0 #f0a7cf, 0 18px 20px rgba(95,44,130,.15);
    }

    .opcion[disabled] {
      cursor: default;
    }

    .mensaje {
      min-height: 56px;
      margin-top: 18px;
      text-align: center;
      font-size: clamp(1.15rem, 4vw, 1.7rem);
      font-weight: 900;
    }

    .boton-siguiente, .boton-reiniciar {
      display: none;
      margin: 18px auto 0;
      border: 0;
      border-radius: 999px;
      padding: 16px 28px;
      background: linear-gradient(135deg, var(--amarillo), #ff9ec4, var(--lila));
      color: #fff;
      font-size: clamp(1.2rem, 4vw, 1.75rem);
      font-weight: 900;
      text-shadow: 0 2px 0 rgba(95,44,130,.2);
      box-shadow: 0 10px 0 rgba(159, 89, 190, .65), 0 20px 26px rgba(95,44,130,.18);
      cursor: pointer;
    }

    .boton-siguiente.visible, .boton-reiniciar.visible {
      display: block;
      animation: aparecer .35s ease both;
    }

    @keyframes aparecer {
      from { transform: translateY(12px) scale(.94); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    .celebracion {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      overflow: hidden;
    }

    .confetti {
      position: absolute;
      top: -40px;
      font-size: 2rem;
      animation: caer 1.45s ease-in forwards;
    }

    @keyframes caer {
      0% { transform: translateY(-30px) rotate(0deg) scale(.8); opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(110vh) rotate(420deg) scale(1.15); opacity: 0; }
    }

    .suave {
      animation: abrazo .5s ease;
    }

    @keyframes abrazo {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px) rotate(-1deg); }
      50% { transform: translateX(8px) rotate(1deg); }
      75% { transform: translateX(-4px) rotate(-.5deg); }
    }

    .pantalla-final {
      display: none;
      text-align: center;
      padding: 12px;
    }

    .pantalla-final.visible {
      display: block;
      animation: aparecer .55s ease both;
    }

    .trofeo {
      font-size: clamp(4rem, 18vw, 9rem);
      animation: fiesta 1s ease-in-out infinite alternate;
    }

    @keyframes fiesta {
      from { transform: rotate(-6deg) scale(1); filter: drop-shadow(0 10px 12px rgba(95,44,130,.14)); }
      to { transform: rotate(6deg) scale(1.12); filter: drop-shadow(0 16px 18px rgba(255,143,199,.35)); }
    }

    .resultado-titulo {
      font-size: clamp(2rem, 7vw, 4rem);
      color: #fff;
      text-shadow: 0 5px 0 rgba(142, 68, 173, .28), 0 12px 26px rgba(95, 44, 130, .22);
      margin: 12px 0;
    }

    .resultado-texto {
      font-size: clamp(1.35rem, 4.8vw, 2.25rem);
      font-weight: 900;
      line-height: 1.25;
      background: rgba(255,255,255,.75);
      border-radius: 28px;
      padding: 18px;
      border: 3px solid #fff;
    }

    @media (max-width: 760px) {
      .opciones { grid-template-columns: 1fr; }
      .opcion { min-height: 86px; }
      .barra-superior { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="decoracion" aria-hidden="true">
    <span class="flotante f1">💖</span>
    <span class="flotante f2">🌈</span>
    <span class="flotante f3">⭐</span>
    <span class="flotante f4">🦄</span>
    <span class="flotante f5">🌸</span>
    <span class="flotante f6">✨</span>
  </div>

  <div class="celebracion" id="celebracion" aria-hidden="true"></div>

  <main class="contenedor">
    <header>
      <h1>🔬 Prueba fundacional 1</h1>
      <p class="subtitulo">Ciencias kawaii para 1° básico 🌷</p>
    </header>

    <section class="tarjeta" id="juego" aria-live="polite">
      <div class="barra-superior">
        <div class="puntaje" id="puntaje">Puntaje: 0 ⭐</div>
        <div class="progreso" id="progreso">Pregunta 1 de 20</div>
      </div>

      <div class="pregunta" id="pregunta"></div>
      <div class="opciones" id="opciones"></div>
      <div class="mensaje" id="mensaje"></div>
      <button class="boton-siguiente" id="siguiente" type="button">Siguiente pregunta ➜</button>
    </section>

    <section class="pantalla-final" id="final" aria-live="polite">
      <div class="trofeo">🏆🌈✨</div>
      <h2 class="resultado-titulo">¡Juego terminado!</h2>
      <p class="resultado-texto" id="resultadoTexto"></p>
      <button class="boton-reiniciar visible" id="reiniciar" type="button">Jugar otra vez 💖</button>
    </section>
  </main>

  <script>
    const preguntas = [
      {
        texto: "Antes de comer o después de jugar afuera, ¿cuál hábito ayuda a evitar microbios? 🧼",
        opciones: ["Lavarse con agua y jabón 🫧", "Limpiarse solo en la ropa 👕", "Soplarse las manos 🌬️"],
        correcta: 0
      },
      {
        texto: "¿Qué colación entrega más vitaminas y ayuda a cuidar el cuerpo? 🍎",
        opciones: ["Fruta y verduras de colores 🥦", "Solo caramelos todos los días 🍬", "Papel picado de colores 📄"],
        correcta: 0
      },
      {
        texto: "Para crecer, aprender y tener energía al día siguiente, en la noche necesitamos... 🌙",
        opciones: ["Dormir suficientes horas 😴", "Quedarnos despiertos jugando 🧸", "Correr por la casa sin parar 🏃‍♀️"],
        correcta: 0
      },
      {
        texto: "Si quieres observar el color y la forma de una flor, ¿qué órgano usas principalmente? 🌸",
        opciones: ["Los ojos 👀", "Las orejas 👂", "La lengua 👅"],
        correcta: 0
      },
      {
        texto: "Cuando escuchas una campana sin verla, ¿qué sentido te ayuda a reconocerla? 🔔",
        opciones: ["El oído 👂", "El gusto 👅", "El olfato 👃"],
        correcta: 0
      },
      {
        texto: "¿Cuál acción protege mejor tus ojos en un día con sol fuerte? ☀️",
        opciones: ["Usar gorro o lentes de sol 🕶️", "Mirar el sol fijamente 😵", "Frotarlos con arena 🏖️"],
        correcta: 0
      },
      {
        texto: "¿Qué grupo reúne necesidades básicas que comparten plantas, animales y personas? 🌱",
        opciones: ["Agua, aire y alimento 💧", "Juguetes, televisión y dulces 📺", "Pintura, pegamento y tijeras ✂️"],
        correcta: 0
      },
      {
        texto: "Un animal con plumas, pico y alas pertenece al grupo de... 🪶",
        opciones: ["Las aves 🐦", "Los peces 🐟", "Los insectos 🐜"],
        correcta: 0
      },
      {
        texto: "¿Qué característica permite a un pez vivir mejor en el agua? 🐠",
        opciones: ["Tiene aletas para nadar 💦", "Tiene raíces bajo la tierra 🌿", "Tiene lana para abrigarse 🧶"],
        correcta: 0
      },
      {
        texto: "¿Qué parte de la planta absorbe agua y sales minerales desde la tierra? 🌿",
        opciones: ["La raíz 🥕", "La flor 🌼", "El fruto 🍓"],
        correcta: 0
      },
      {
        texto: "¿Qué parte de la planta sostiene las hojas y transporta agua hacia ellas? 🌻",
        opciones: ["El tallo 🟢", "La piedra 🪨", "El nido 🪺"],
        correcta: 0
      },
      {
        texto: "Si vamos a comer verduras crudas, ¿qué paso es más seguro antes de comerlas? 🥬",
        opciones: ["Lavarlas muy bien con agua 🚿", "Dejarlas en el suelo un rato 👟", "Guardarlas sin mirar 🙃"],
        correcta: 0
      },
      {
        texto: "¿Qué acción cuida mejor el hogar de animales y plantas en un paseo? 🇨🇱",
        opciones: ["Llevarse la basura y no romper plantas 🌎", "Botar envoltorios al río 🗑️", "Arrancar flores por juego 🌺"],
        correcta: 0
      },
      {
        texto: "¿Qué animal chileno vive en la cordillera, tiene cuello largo y se parece a un camello pequeño? 🏔️",
        opciones: ["Guanaco 🦙", "Tiburón 🦈", "Gallina 🐔"],
        correcta: 0
      },
      {
        texto: "Si una planta no recibe luz por muchos días, ¿qué puede ocurrir? 🌤️",
        opciones: ["Puede debilitarse porque necesita luz para crecer 🍃", "Crece igual dentro de una caja cerrada 📦", "Se convierte en piedra 🪨"],
        correcta: 0
      },
      {
        texto: "¿Cuál es una señal de que un ser vivo está creciendo? 📏",
        opciones: ["Aumenta de tamaño con el tiempo 🌱", "Nunca cambia nada 🧊", "Se vuelve invisible ✨"],
        correcta: 0
      },
      {
        texto: "¿Qué sentido usas para reconocer el olor de una naranja antes de probarla? 🍊",
        opciones: ["El olfato 👃", "El tacto ✋", "La vista solamente 👀"],
        correcta: 0
      },
      {
        texto: "Si tocas una taza y notas que está caliente, ¿qué sentido te avisó? ☕",
        opciones: ["El tacto ✋", "El gusto 👅", "El oído 👂"],
        correcta: 0
      },
      {
        texto: "¿Qué opción muestra una forma responsable de cuidar el agua? 💧",
        opciones: ["Cerrar la llave mientras me cepillo 🚰", "Dejar la llave abierta sin usarla 🛁", "Botar aceite al lavaplatos 🫗"],
        correcta: 0
      },
      {
        texto: "¿Por qué no debemos compartir cepillo de dientes? 🪥",
        opciones: ["Porque puede pasar microbios de una persona a otra 🦠", "Porque cambia de color al instante 🌈", "Porque deja de ser un cepillo 🪄"],
        correcta: 0
      }
    ];

    const preguntaEl = document.getElementById("pregunta");
    const opcionesEl = document.getElementById("opciones");
    const puntajeEl = document.getElementById("puntaje");
    const progresoEl = document.getElementById("progreso");
    const mensajeEl = document.getElementById("mensaje");
    const siguienteBtn = document.getElementById("siguiente");
    const juegoEl = document.getElementById("juego");
    const finalEl = document.getElementById("final");
    const resultadoTexto = document.getElementById("resultadoTexto");
    const reiniciarBtn = document.getElementById("reiniciar");
    const celebracionEl = document.getElementById("celebracion");

    let indice = 0;
    let puntaje = 0;
    let audioContext;

    function mezclarOpciones(pregunta) {
      return pregunta.opciones.map((texto, i) => ({ texto, correcta: i === pregunta.correcta }))
        .sort(() => Math.random() - 0.5);
    }

    function obtenerAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioContext;
    }

    function tocarTono(frecuencia, inicio, duracion, tipo = "sine", volumen = 0.08) {
      const ctx = obtenerAudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = tipo;
      osc.frequency.setValueAtTime(frecuencia, ctx.currentTime + inicio);
      gain.gain.setValueAtTime(0.001, ctx.currentTime + inicio);
      gain.gain.exponentialRampToValueAtTime(volumen, ctx.currentTime + inicio + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + inicio + duracion);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + inicio);
      osc.stop(ctx.currentTime + inicio + duracion + 0.03);
    }

    function sonidoAcierto() {
      tocarTono(523.25, 0, 0.16, "triangle", 0.09);
      tocarTono(659.25, 0.12, 0.16, "triangle", 0.09);
      tocarTono(783.99, 0.24, 0.22, "triangle", 0.08);
    }

    function sonidoIntento() {
      tocarTono(392, 0, 0.2, "sine", 0.045);
      tocarTono(329.63, 0.18, 0.25, "sine", 0.035);
    }

    function sonidoFinal() {
      [523.25, 659.25, 783.99, 1046.5, 987.77, 1046.5].forEach((nota, i) => {
        tocarTono(nota, i * 0.13, 0.18, "triangle", 0.08);
      });
    }

    function lanzarConfetti(cantidad = 26) {
      const simbolos = ["⭐", "✨", "💖", "🌸", "🌈", "🧁", "💫"];
      for (let i = 0; i < cantidad; i++) {
        const pieza = document.createElement("span");
        pieza.className = "confetti";
        pieza.textContent = simbolos[Math.floor(Math.random() * simbolos.length)];
        pieza.style.left = `${Math.random() * 100}%`;
        pieza.style.animationDelay = `${Math.random() * 0.35}s`;
        pieza.style.fontSize = `${1.3 + Math.random() * 1.8}rem`;
        celebracionEl.appendChild(pieza);
        setTimeout(() => pieza.remove(), 1800);
      }
    }

    function crearEstrellasFondo() {
      const decoracion = document.querySelector(".decoracion");
      for (let i = 0; i < 28; i++) {
        const estrella = document.createElement("span");
        estrella.className = "estrella-fondo";
        estrella.textContent = Math.random() > 0.45 ? "✦" : "♡";
        estrella.style.left = `${Math.random() * 100}%`;
        estrella.style.top = `${Math.random() * 100}%`;
        estrella.style.fontSize = `${0.8 + Math.random() * 1.5}rem`;
        estrella.style.animationDelay = `${Math.random() * 2}s`;
        decoracion.appendChild(estrella);
      }
    }

    function mostrarPregunta() {
      const actual = preguntas[indice];
      const opcionesMezcladas = mezclarOpciones(actual);
      preguntaEl.textContent = actual.texto;
      opcionesEl.innerHTML = "";
      mensajeEl.textContent = "";
      siguienteBtn.classList.remove("visible");
      progresoEl.textContent = `Pregunta ${indice + 1} de ${preguntas.length}`;
      puntajeEl.textContent = `Puntaje: ${puntaje} ⭐`;

      opcionesMezcladas.forEach((opcion) => {
        const boton = document.createElement("button");
        boton.className = "opcion";
        boton.type = "button";
        boton.textContent = opcion.texto;
        boton.addEventListener("click", () => responder(boton, opcion.correcta));
        opcionesEl.appendChild(boton);
      });
    }

    function responder(botonElegido, esCorrecta) {
      const botones = [...document.querySelectorAll(".opcion")];
      botones.forEach((boton) => {
        boton.disabled = true;
        if (boton === botonElegido) {
          boton.classList.add(esCorrecta ? "correcta" : "incorrecta");
        }
      });

      if (esCorrecta) {
        puntaje++;
        puntajeEl.textContent = `Puntaje: ${puntaje} ⭐`;
        mensajeEl.textContent = "¡Súper! Lo hiciste brillante ✨";
        sonidoAcierto();
        lanzarConfetti();
      } else {
        mensajeEl.textContent = "Buen intento, aprender también es probar 💕";
        sonidoIntento();
        juegoEl.classList.remove("suave");
        void juegoEl.offsetWidth;
        juegoEl.classList.add("suave");
        botones.find((boton) => preguntas[indice].opciones.includes(boton.textContent) &&
          preguntas[indice].opciones[preguntas[indice].correcta] === boton.textContent)?.classList.add("correcta");
      }

      siguienteBtn.textContent = indice === preguntas.length - 1 ? "Ver mi resultado 🏆" : "Siguiente pregunta ➜";
      siguienteBtn.classList.add("visible");
    }

    function finalizarJuego() {
      juegoEl.style.display = "none";
      finalEl.classList.add("visible");
      const total = preguntas.length;
      const porcentaje = puntaje / total;
      let mensaje;
      if (porcentaje >= 0.9) {
        mensaje = `¡Asombroso! Obtuviste ${puntaje} de ${total} ⭐. Eres una científica brillante y cuidadosa 🔬💖`;
      } else if (porcentaje >= 0.65) {
        mensaje = `¡Muy bien! Obtuviste ${puntaje} de ${total} ⭐. Sabes mucho de seres vivos, sentidos y salud 🌱✨`;
      } else {
        mensaje = `¡Buen trabajo! Obtuviste ${puntaje} de ${total} ⭐. Sigue practicando con alegría, cada intento te hace aprender más 🌈💕`;
      }
      resultadoTexto.textContent = mensaje;
      lanzarConfetti(70);
      sonidoFinal();
    }

    siguienteBtn.addEventListener("click", () => {
      indice++;
      if (indice >= preguntas.length) {
        finalizarJuego();
      } else {
        mostrarPregunta();
      }
    });

    reiniciarBtn.addEventListener("click", () => {
      indice = 0;
      puntaje = 0;
      finalEl.classList.remove("visible");
      juegoEl.style.display = "block";
      mostrarPregunta();
    });

    crearEstrellasFondo();
    mostrarPregunta();
  </script>
</body>
</html>
